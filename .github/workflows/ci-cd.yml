name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '7.0'
    
    - name: Restore dependencies
      run: dotnet restore src/KylyProductsAPI/KylyProductsAPI.csproj
    
    - name: Build
      run: dotnet build src/KylyProductsAPI/KylyProductsAPI.csproj -c Release --no-restore
    
    - name: Run tests
      run: dotnet test src/KylyProductsAPI/KylyProductsAPI.csproj -c Release --no-build --verbosity normal || true

  build-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        cd src/KylyProductsWeb
        npm ci
    
    - name: Build
      run: |
        cd src/KylyProductsWeb
        npm run build
    
    - name: Lint
      run: |
        cd src/KylyProductsWeb
        npm run lint || true

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
